<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,height=device-height,user-scalable=no,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0">
    <title>浮光网 · 轻导航</title>
    <style>
        @font-face {
            font-family: iconfont;
            src: url(https://at.alicdn.com/t/font_1706200_3sgw4esvyq9.eot?t=1584846914425);
            src: url(https://at.alicdn.com/t/font_1706200_3sgw4esvyq9.eot?t=1584846914425#iefix) format('embedded-opentype')
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-weight: 300
        }
        a {
            text-decoration: none
        }
        body {
            height: 100%;
            overflow: hidden;
            overflow-y: auto;
            background: #01a982;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 60px;
            min-height: 100vh;
            z-index: 2;
        }

        /* ===== 修复粒子：从底部升起 ===== */
        .animation-wrapper {
            position: fixed;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none; /* 避免干扰点击 */
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.6;
            animation: floatUp linear infinite;
            will-change: transform;
        }
        /* 每个粒子独立设置尺寸、位置、延迟、持续时长 —— 保证从底部 (bottom: -5%) 开始上升 */
        .particle-1 {
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.7);
            left: 8%;
            bottom: -8%;                     /* 从底部外开始 */
            animation-duration: 22s;
            animation-delay: 0s;
            box-shadow: 0 0 6px rgba(255,255,255,0.3);
        }
        .particle-2 {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            left: 25%;
            bottom: -12%;
            animation-duration: 28s;
            animation-delay: 3s;
            box-shadow: 0 0 8px rgba(255,255,255,0.2);
        }
        .particle-3 {
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.8);
            left: 45%;
            bottom: -6%;
            animation-duration: 19s;
            animation-delay: 1.5s;
        }
        .particle-4 {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            left: 65%;
            bottom: -15%;
            animation-duration: 32s;
            animation-delay: 5s;
            box-shadow: 0 0 12px rgba(255,255,255,0.15);
        }
        .particle-5 {
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.6);
            left: 82%;
            bottom: -10%;
            animation-duration: 25s;
            animation-delay: 2s;
        }
        .particle-6 {
            width: 3px;
            height: 3px;
            background: rgba(200, 240, 230, 0.7);
            left: 15%;
            bottom: -20%;
            animation-duration: 35s;
            animation-delay: 6s;
        }
        .particle-7 {
            width: 7px;
            height: 7px;
            background: rgba(255, 255, 255, 0.4);
            left: 52%;
            bottom: -18%;
            animation-duration: 29s;
            animation-delay: 4s;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }
        .particle-8 {
            width: 4px;
            height: 4px;
            background: rgba(220, 245, 235, 0.6);
            left: 73%;
            bottom: -7%;
            animation-duration: 20s;
            animation-delay: 1s;
        }
        .particle-9 {
            width: 9px;
            height: 9px;
            background: rgba(255, 255, 255, 0.25);
            left: 35%;
            bottom: -25%;
            animation-duration: 38s;
            animation-delay: 7s;
        }
        .particle-10 {
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.9);
            left: 91%;
            bottom: -5%;
            animation-duration: 18s;
            animation-delay: 0.5s;
        }

        /* 关键帧：从底部 (translateY(0)) 上升到顶部 (translateY(-120vh)) 并淡出 */
        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.7;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-120vh) scale(0.6);
                opacity: 0;
            }
        }

        /* 主容器 */
        .main {
            position: relative;
            z-index: 3;
            max-width: 680px;
            margin: 0 auto;
            padding: 20px 16px 30px;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 28px;
            padding-top: 10px;
        }
        .brand-header h1 {
            font-size: 44px;
            font-weight: 500;
            letter-spacing: 2px;
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.15);
            margin-bottom: 6px;
        }
        .brand-header .sub {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            letter-spacing: 1px;
            font-weight: 300;
            border-top: 1px solid rgba(255,255,255,0.2);
            display: inline-block;
            padding-top: 8px;
            padding-left: 20px;
            padding-right: 20px;
        }

        .content {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            box-shadow: 0 20px 40px -12px rgba(0, 40, 30, 0.4);
            padding: 20px 0 12px 0;
            transition: all 0.2s;
        }

        .content-top {
            padding: 0 20px 8px 20px;
        }

        .content-top ul {
            list-style: none;
            margin-top: 4px;
        }
        .content-top ul li {
            display: block;
            padding: 14px 0 14px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .content-top ul li:last-child {
            border-bottom: none;
        }
        .content-top ul li h3 {
            font-size: 18px;
            font-weight: 500;
            color: #1a2e2a;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }
        .content-top ul li p {
            font-size: 14px;
            color: #5a6b66;
            line-height: 1.5;
            margin: 4px 0 6px 0;
        }
        .content-top ul li a {
            display: inline-block;
            margin-top: 4px;
            font-weight: 500;
            color: #01a982;
            background: rgba(1, 169, 130, 0.08);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 14px;
            transition: all 0.2s;
            border: 1px solid rgba(1, 169, 130, 0.2);
        }
        .content-top ul li a:hover {
            background: #01a982;
            color: white;
            border-color: #01a982;
        }

        p.footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-weight: 400;
            margin: 30px auto 10px;
            max-width: 500px;
            line-height: 1.6;
            padding: 0 12px;
        }
        p.footer a {
            color: #b8f0e0;
            border-bottom: 1px dotted rgba(255,255,255,0.2);
        }
        p.footer a:hover {
            color: white;
            border-bottom-color: white;
        }

        @media (max-width: 600px) {
            .brand-header h1 { font-size: 34px; }
            .brand-header .sub { font-size: 14px; }
            .content { border-radius: 20px; }
            .content-top ul li h3 { font-size: 17px; }
        }
        @media (max-width: 420px) {
            .main { padding: 12px 12px 20px; }
            .brand-header h1 { font-size: 28px; }
            .content-top { padding: 0 14px; }
        }

        .wrapper {
            padding-bottom: 70px;
        }
    </style>
</head>
<body>
    <!-- 粒子背景：10个独立粒子，从底部升起 -->
    <div class="animation-wrapper">
        <div class="particle particle-1"></div>
        <div class="particle particle-2"></div>
        <div class="particle particle-3"></div>
        <div class="particle particle-4"></div>
        <div class="particle particle-5"></div>
        <div class="particle particle-6"></div>
        <div class="particle particle-7"></div>
        <div class="particle particle-8"></div>
        <div class="particle particle-9"></div>
        <div class="particle particle-10"></div>
    </div>

    <div id="all">
        <div class="wrapper">
            <div class="brand-header">
                <h1>示列</h1>
                <div class="sub">· 轻量资源聚合 ·</div>
            </div>

            <div class="main">
                <div class="content">
                    <div class="content-top">
                        <ul>
                            <li>
                                <h3>预览</h3>
                                <a href="https://fgwl.qzz.io/fgw/" target="_blank">点我进入</a>
                            </li>
                            <li>
                                <h3>测试</h3>
                                <a href="http://fgwl.qzz.io/" target="_blank">点我进入</a>
                            </li>
                        </ul>
                    </div>
                </div>
                <p class="footer">备案信息</p>
            </div>
        </div>
    </div>
    
</body>
</html>
